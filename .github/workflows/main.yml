name: Auto Fetch Anime

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Execute Scraper
        id: scrape_step
        run: |
          # تأكد هنا من كتابة الاسم الصحيح لملفك مع صيغة .py
          python anime-data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f movies.json ]; then
            git add movies.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update anime data" && git push)
          else
            echo "🚨 Error: movies.json was not created by the scraper!" && exit 1
          fi

      # 🔔 هذه الخطوة الذكية سترسل لك تنبيهاً على التيليجرام فوراً إذا فشل الكشط أو لم يجد الملف
      - name: Send Telegram Notification on Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot8859232723:AAE7Y4mNxn0Mq2tnaCQZmDdBQcknXNy-zSI/sendMessage" \
          -d chat_id="YOUR_PERSONAL_CHAT_ID" \
          -d text="⚠️ Github Actions Alert: Anime Scraper has FAILED to update movies.json. Please check Github!"
